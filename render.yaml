services:
  # 1. The FastAPI Backend
  - type: web
    name: catalog-backend-api
    env: python
    plan: free # <-- This forces the service onto the Free Tier
    buildCommand: pip install -r requirement.txt
    startCommand: uvicorn model.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

  # 2. The Streamlit Frontend
  - type: web
    name: catalog-frontend-ui
    env: python
    plan: free # <-- This forces the service onto the Free Tier
    buildCommand: pip install -r requirement.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: BACKEND_API_URL
        fromService:
          type: web
          name: catalog-backend-api
          envVarKey: RENDER_EXTERNAL_URL